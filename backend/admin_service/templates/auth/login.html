<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход — {{ app_name }}</title>
    <link rel="stylesheet" href="{{ base_path }}/static/admin.css">
</head>
<body class="login-body">
<main class="login-container">
    <section class="card">
        <h1>{{ app_name }}</h1>
        <p>Войдите, чтобы продолжить.</p>
        {% if error %}
        <div class="alert alert-error">{{ error }}</div>
        {% endif %}
        <form method="post" action="{{ base_path }}/login">
            <input type="hidden" name="csrf_token" value="{{ request.state.csrf_token }}">
            <label>
                Логин
                <input type="text" name="username" value="{{ username }}" autocomplete="username" required>
            </label>
            <label>
                Пароль
                <input type="password" name="password" autocomplete="current-password" required>
            </label>
            <label>
                Код 2FA (если включён)
                <input type="text" name="totp" autocomplete="one-time-code" inputmode="numeric" pattern="[0-9 ]*">
            </label>
            <button type="submit" class="btn btn-primary">Войти</button>
        </form>
    </section>
</main>
</body>
</html>
