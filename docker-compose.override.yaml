services:
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "8081:8081"
    volumes:
      - ./nginx/conf.d/dev.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend

  backend:
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./backend:/code

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    env_file:
      - .env
    volumes:
      - ./frontend:/code
      - frontend_node_modules:/code/node_modules
