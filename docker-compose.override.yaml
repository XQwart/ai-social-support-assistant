  migrations:
    volumes:
      - ./backend:/code

  db:
    ports:
      - "${POSTGRES_PORT}:5432"
  qdrant:
    ports:
      - "${QDRANT_PORT}:6333"
    volumes:
      - ./volumes/qdrant:/qdrant/storage

volumes:
  frontend_node_modules:
