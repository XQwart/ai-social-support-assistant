server {
    listen 8081;
    server_name _;

    location / {
        proxy_pass http://frontend:5173;
        proxy_set_header Host $host;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /docs {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
    }

    location /openapi.json {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
    }

    # ------------------------------------------------------------------
    # Admin panel — defense in depth: IP allowlist + Basic Auth (nginx)
    # plus app-level Argon2/JWT/CSRF/TOTP inside admin_service.
    # The htpasswd file is operator-generated and bind-mounted from
    # ./nginx/admin.htpasswd. Generate with:
    #   htpasswd -B -c nginx/admin.htpasswd admin
    # ------------------------------------------------------------------
    location /admin/static/ {
        # Static assets — same allowlist, no Basic Auth so that the
        # browser does not have to re-prompt on every asset; HTML
        # navigation is still gated by the /admin/ block.
        allow 127.0.0.1;
        allow 10.0.0.0/8;
        allow 172.16.0.0/12;
        allow 192.168.0.0/16;
        deny all;

        proxy_pass http://admin:8001/admin/static/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /admin/ {
        allow 127.0.0.1;
        allow 10.0.0.0/8;
        allow 172.16.0.0/12;
        allow 192.168.0.0/16;
        deny all;

        auth_basic "Restricted — Admin";
        auth_basic_user_file /etc/nginx/admin.htpasswd;

        proxy_pass http://admin:8001/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Tell the upstream it lives at /admin so url generators inside
        # the app keep emitting /admin/... links instead of /...
        proxy_set_header X-Forwarded-Prefix /admin;

        # Belt-and-suspenders for any stray absolute redirects or
        # cookies the upstream might set without the /admin prefix.
        # If the app ever returns ``Location: /something`` or
        # ``Set-Cookie: ...; Path=/``, rewrite to keep the browser
        # inside the admin namespace.
        proxy_redirect ~^/(?!admin/)(.*)$ /admin/$1;
    }
}
