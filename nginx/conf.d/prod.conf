server {
    listen 80;
    server_name your-domain.ru www.your-domain.ru;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name your-domain.ru www.your-domain.ru;

    ssl_certificate /etc/nginx/ssl/certificate.crt;
    ssl_certificate_key /etc/nginx/ssl/certificate.key;
    ssl_trusted_certificate /etc/nginx/ssl/ca_bundle.crt;

    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ------------------------------------------------------------------
    # Admin panel — defense in depth: IP allowlist + Basic Auth (nginx)
    # plus app-level Argon2/JWT/CSRF/TOTP inside admin_service.
    # The htpasswd file is operator-generated and bind-mounted from
    # ./nginx/admin.htpasswd. Tighten the allowlist to the office /
    # bastion network for production.
    # ------------------------------------------------------------------
    location /admin/static/ {
        allow 127.0.0.1;
        # Replace the line below with the exact CIDRs allowed in prod.
        allow 10.0.0.0/8;
        deny all;

        proxy_pass http://admin:8001/static/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /admin/ {
        allow 127.0.0.1;
        # Replace the line below with the exact CIDRs allowed in prod.
        allow 10.0.0.0/8;
        deny all;

        auth_basic "Restricted — Admin";
        auth_basic_user_file /etc/nginx/admin.htpasswd;

        proxy_pass http://admin:8001/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Tell the upstream it lives at /admin so url generators inside
        # the app keep emitting /admin/... links instead of /...
        proxy_set_header X-Forwarded-Prefix /admin;

        # Belt-and-suspenders: rewrite any stray absolute redirects /
        # cookies that escaped the prefix at the app layer, so the
        # browser stays inside /admin/.
        proxy_redirect ~^/(?!admin/)(.*)$ /admin/$1;
        proxy_cookie_path / /admin/;
    }
}
